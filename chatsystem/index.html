<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #chat-wrap { display: flex; flex-direction: column; width: 420px; height: 580px; background: #fff; border-radius: 16px; border: 1px solid #e0e0e0; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    #chat-header { padding: 14px 18px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B6D11; }
    #status-dot.thinking { background: #BA7517; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #chat-title { font-size: 15px; font-weight: 600; color: #111; }
    #chat-model { font-size: 12px; color: #888; margin-left: auto; }
    #clear-btn { font-size: 12px; color: #888; background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    #clear-btn:hover { background: #f0f0f0; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .user .bubble { background: #dbeafe; color: #1e40af; border-bottom-right-radius: 4px; }
    .assistant .bubble { background: #f5f5f5; color: #111; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 11px; color: #aaa; }
    .user .msg-time { text-align: right; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    #input-area { padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end; }
    #user-input { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 10px; padding: 9px 12px; font-size: 14px; line-height: 1.5; min-height: 40px; max-height: 120px; outline: none; background: #fafafa; }
    #user-input:focus { border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55,138,221,0.15); }
    #send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #378ADD; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    #send-btn:hover { background: #2563eb; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }
    #error-bar { display: none; padding: 8px 16px; background: #fee2e2; color: #b91c1c; font-size: 13px; }
  </style>
</head>
<body>
<div id="chat-wrap">
  <div id="chat-header">
    <div id="status-dot"></div>
    <span id="chat-title">Claude Assistant</span>
    <span id="chat-model">claude-sonnet-4-20250514</span>
    <button id="clear-btn" onclick="clearChat()">Clear</button>
  </div>
  <div id="error-bar"></div>
  <div id="messages">
    <div class="msg assistant">
      <div class="bubble">Hi! I'm Claude. How can I help you today?</div>
      <span class="msg-time">Just now</span>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_KEY = 'YOUR_ANTHROPIC_API_KEY'; // 🔑 Replace this!
  const history = [];
  let isThinking = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const errorBar = document.getElementById('error-bar');

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  function timeStr() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="bubble">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><span class="msg-time">${timeStr()}</span>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg assistant'; div.id = 'typing';
    div.innerHTML = '<div class="bubble"><div class="typing-indicator"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  function showError(msg) {
    errorBar.textContent = msg; errorBar.style.display = 'block';
    setTimeout(() => errorBar.style.display = 'none', 4000);
  }

  function clearChat() {
    history.length = 0; messagesEl.innerHTML = '';
    addMessage('assistant', "Chat cleared! How can I help you?");
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isThinking) return;
    isThinking = true; sendBtn.disabled = true; statusDot.className = 'thinking';
    inputEl.value = ''; inputEl.style.height = 'auto';
    addMessage('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a helpful, friendly AI assistant. Keep responses concise and clear.',
          messages: history
        })
      });
      const data = await res.json();
      hideTyping();
      if (data.error) { showError(data.error.message); history.pop(); return; }
      const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      history.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
    } catch (err) {
      hideTyping(); showError('Connection error. Please try again.'); history.pop();
    } finally {
      isThinking = false; sendBtn.disabled = false; statusDot.className = ''; inputEl.focus();
    }
  }
</script>
</body>
</html>
